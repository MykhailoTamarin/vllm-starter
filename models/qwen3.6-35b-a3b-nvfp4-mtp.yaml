# ── NVIDIA Qwen3.6-35B-A3B-NVFP4 (MoE MTP) ─────────────────────────────────
# MoE variant of Qwen3.6-35B-A3B, NVFP4 quantized via nvidia-modelopt
# MTP speculative decoding — 3 speculative tokens per step
# 262K context, Apache 2.0
#
# Sampling parameters for Qwen-style generation:
# - Thinking general: temperature=1.0, top_p=0.95, top_k=20, min_p=0.0, presence_penalty=0.0, repetition_penalty=1.0
# - Thinking coding: temperature=0.6, top_p=0.95, top_k=20, min_p=0.0, presence_penalty=0.0, repetition_penalty=1.0
# - Instruct/non-thinking: temperature=0.7, top_p=0.80, top_k=20, min_p=0.0, presence_penalty=1.5, repetition_penalty=1.0
#
# Recommended for: fast text inference, agentic coding, code generation
# ⚠️ Requires nightly (commit 22a5864): Qwen3.6 MTP architecture not in stable yet.
#
# Container: vllm-qwen3.6-35b-a3b
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/nvidia/Qwen3.6-35B-A3B-NVFP4
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:nightly-22a58640b4563f5945aa2052e9e61d425351588d
port: 8000

env:
  FLASHINFER_DISABLE_VERSION_CHECK=1
  CUTE_DSL_ARCH=sm_121a
  VLLM_ATTENTION_BACKEND=FLASHINFER
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600
  VLLM_MARLIN_USE_ATOMIC_ADD=1

args: 
  --model nvidia/Qwen3.6-35B-A3B-NVFP4
  --served-model-name qwen3.6-35b-a3b
  --port 8000
  --tensor-parallel-size 1
  --trust-remote-code
  --dtype auto
  --quantization modelopt
  --kv-cache-dtype fp8
  --attention-backend flashinfer
  --moe-backend marlin
  --gpu-memory-utilization 0.85
  --max-model-len 262144
  --max-num-seqs 8
  --max-num-batched-tokens 32768
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --disable-access-log-for-endpoints /health,/metrics,/ping
  --reasoning-parser qwen3
