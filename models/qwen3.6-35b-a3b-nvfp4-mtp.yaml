# ── NVIDIA Qwen3.6-35B-A3B-NVFP4 (MoE MTP) ─────────────────────────────────
# MoE variant of Qwen3.6-35B-A3B, NVFP4 quantized via nvidia-modelopt
# MTP speculative decoding — 3 speculative tokens per step
# 262K context, Apache 2.0
#
# Recommended for: fast text inference, agentic coding, code generation
# ⚠️ Requires nightly: NVFP4 quantization not yet available in stable releases
#
# Container: vllm-qwen3.6-35b-a3b
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/nvidia/Qwen3.6-35B-A3B-NVFP4
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:nightly
port: 8000

env: FLASHINFER_DISABLE_VERSION_CHECK=1
  CUTE_DSL_ARCH=sm_121a
  VLLM_ATTENTION_BACKEND=FLASHINFER
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600

args: 
  --model nvidia/Qwen3.6-35B-A3B-NVFP4
  --served-model-name qwen3.6-35b-a3b
  --port 8000
  --tensor-parallel-size 1
  --trust-remote-code
  --dtype auto
  --quantization modelopt
  --kv-cache-dtype fp8
  --attention-backend flashinfer
  --moe-backend marlin
  --gpu-memory-utilization 0.85
  --max-model-len 262144
  --max-num-seqs 4
  --max-num-batched-tokens 32768
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --disable-access-log-for-endpoints /health,/metrics,/ping
  --reasoning-parser qwen3
  --chat-template /app/chat_template.jinja

volumes:
 - ${PROJECT_DIR}/models/files/chat_template.jinja:/app/chat_template.jinja
 