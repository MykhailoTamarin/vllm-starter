# ── NVIDIA Nemotron-3-Super 120B-A12B NVFP4 ────────────────────────────────
# LatentMoE hybrid (Mamba-2 + MoE + Attention) — 120B total, 12B active params
# 262k context, 512 latent experts, 1024 dense layers, NVFP4 quantized
# MTP speculative decoding (3 tokens) for faster generation
#
# Recommended for: advanced reasoning, math, code, multilingual (en/fr/es/
# de/ja/zh)
# Stable image: vllm/vllm-openai:v0.20.0.
# ⚠️ Requires vLLM 0.20.x+; also requires reasoning parser plugin file
# mounted at /app/super_v3_reasoning_parser.py
#
# Container: vllm-nemotron-3-super
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.20.0
port: 8000

env: 
  CUDA_MANAGED_FORCE_DEVICE_ALLOC=1
  OMP_NUM_THREADS=4
  PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True
  VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
  VLLM_MARLIN_USE_ATOMIC_ADD=1
  VLLM_NVFP4_GEMM_BACKEND=marlin
  VLLM_USE_FLASHINFER_MOE_FP4=0
  VLLM_FLASHINFER_ALLREDUCE_BACKEND=trtllm

args: 
  --model nvidia/NVIDIA-Nemotron-3-Super-120B-A12B-NVFP4
  --served-model-name nemotron-3-super
  --port 8000
  --async-scheduling
  --dtype auto
  --tensor-parallel-size 1
  --pipeline-parallel-size 1
  --data-parallel-size 1
  --max-model-len 1000000
  --trust-remote-code
  --max-num-seqs 4
  --kv-cache-dtype fp8
  --gpu-memory-utilization 0.9
  --max-cudagraph-capture-size 128
  --enable-chunked-prefill
  --enable-prefix-caching
  --mamba-ssm-cache-dtype float16
  --reasoning-parser-plugin /app/super_v3_reasoning_parser.py
  --reasoning-parser super_v3
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --max-num-batched-tokens 8192
  --disable-access-log-for-endpoints /health,/metrics,/ping
  --quantization fp4
  --moe-backend marlin
  --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'

volumes:
  - ${PROJECT_DIR}/models/files/super_v3_reasoning_parser.py:/app/super_v3_reasoning_parser.py
