# ── 0xSero/Step-3.7-Flash-148B REAP NVFP4 ──────────────────────────────────
# Vision-language MoE (Step 3.7 Flash, Apache 2.0) — 148B effective params
# REAP-pruned: 212/288 experts kept (50.21B removed), ~11B active/token
# NVFP4 quantized, 95 GB on disk
#
# Recommended for: agentic workflows, tool-use, reasoning, VLM
# ⚠️ Requires stepfun37 vLLM image — NVFP4 not available in stable releases;
# more aggressive pruning than 173B variant — expect higher quality risk
#
# Container: vllm-step3p7-flash-148b
# API:       http://localhost:8001/v1/chat/completions
# HF:        https://huggingface.co/0xSero/Step-3.7-Flash-148B
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:stepfun37
port: 8001

env:
  VLLM_NVFP4_GEMM_BACKEND=flashinfer-cutlass
  VLLM_USE_FLASHINFER_MOE_FP4=0
  FLASHINFER_DISABLE_VERSION_CHECK=1
  VLLM_ATTENTION_BACKEND=FLASHINFER
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600
  SAFETENSORS_FAST_GPU=1
  OMP_NUM_THREADS=8
  TORCHINDUCTOR_MAX_AUTOTUNE=0

args: 
  --model 0xSero/Step-3.7-Flash-148B
  --host 0.0.0.0
  --served-model-name step3p7-flash-148b
  --port 8001
  --tensor-parallel-size 1
  --enable-expert-parallel
  --trust-remote-code
  --dtype auto
  --quantization modelopt
  --kv-cache-dtype fp8
  --disable-cascade-attn
  --attention-backend flashinfer
  --gpu-memory-utilization 0.90
  --max-model-len 131072
  --max-num-seqs 1
  --max-num-batched-tokens 4096
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --enable-auto-tool-choice
  --tool-call-parser step3p5
  --reasoning-parser step3p5
  --disable-access-log-for-endpoints /health,/metrics,/ping
