# ── NVIDIA Qwen3.6-35B-A3B-NVFP4 (MoE MTP + YaRN 1M) ─────────────────────
# NVFP4 variant of Qwen3.6-35B-A3B with YaRN RoPE scaling to 1M context
# MTP speculative decoding — 3 speculative tokens per step
# 0.5M context (factor 2.0 — good quality, minimal short-context degradation)
#
# Requires v0.23.0+ stable — Qwen3.6 MTP + YaRN supported in release.
#
# Container: vllm-qwen3.6-35b-a3b-nvfp4-mtp-yarn
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/nvidia/Qwen3.6-35B-A3B-NVFP4
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.23.0
port: 8000

env:
  FLASHINFER_DISABLE_VERSION_CHECK=1
  CUTE_DSL_ARCH=sm_121a
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600
  VLLM_MARLIN_USE_ATOMIC_ADD=1
  VLLM_ALLOW_LONG_MAX_MODEL_LEN=1

args:
  --model nvidia/Qwen3.6-35B-A3B-NVFP4
  --served-model-name qwen3.6-35b-a3b-yarn
  --port 8000
  --tensor-parallel-size 1
  --hf-overrides "{\"text_config\":{\"rope_parameters\":{\"mrope_interleaved\":true,\"mrope_section\":[11,11,10],\"rope_type\":\"yarn\",\"rope_theta\":10000000,\"partial_rotary_factor\":0.25,\"factor\":4.0,\"original_max_position_embeddings\":262144}}}"
  --trust-remote-code
  --quantization modelopt
  --kv-cache-dtype fp8
  --attention-backend flashinfer
  --moe-backend marlin
  --gpu-memory-utilization 0.7
  --max-model-len 1000000
  --max-num-seqs 4
  --max-num-batched-tokens 8192
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'
  --enable-auto-tool-choice
  --chat-template /app/chat_template.jinja
  --limit-mm-per-prompt '{"image":4}'
  --allowed-media-domains '*'
  --default-chat-template-kwargs '{"enable_thinking":true,"preserve_thinking":true}'
  --load-format fastsafetensors
  --tool-call-parser qwen3_coder
  --disable-access-log-for-endpoints /health,/metrics,/ping
  --reasoning-parser qwen3

volumes:
  - ${PROJECT_DIR}/models/files/qwen_chat_template.jinja:/app/chat_template.jinja
