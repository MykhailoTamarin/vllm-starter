# ── Ornith-1.0-35B ─────────────────────────────────────────────────────────
# Qwen3-5 MoE vision-language model with tool calling and reasoning
# 35B BF16 parameters, 256 experts (8 active), 262k context, MIT licensed
# Recommended for: agentic coding, vision-language tasks, tool use
# ⚠️ Requires tensor-parallel-size >= 8 for single-GPU 80GB; otherwise offload
# Container: vllm-ornith-1-0-35b
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/deepreinforce-ai/Ornith-1.0-35B
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.23.0

# ── Port mapping ─────────────────────────────────────────────────────────────
# Host:container. Container always listens on 8000.
# Set `port:` for host mapping AND `--port` in args for the vLLM server.
port: 8000

# ── HuggingFace cache (optional) ─────────────────────────────────────────────
# Default: $HOME/.cache/huggingface (always mounted)
# Override if you want a custom path:
# hf_cache: /mnt/models/hf-cache

# ── Extra volume mounts (optional) ──────────────────────────────────────────
# Format: host_path:container_path
# Uncomment and add as many as needed:
# volumes:
#   - /mnt/models/checkpoints:/models/checkpoints
#   - /mnt/data/results:/app/results

# ── Environment variables ────────────────────────────────────────────────────
# Passed to the container as -e KEY=VALUE.
# ${HF_TOKEN} and ${VLLM_API_KEY} are always added from your shell env.
env:
  # VLLM_USE_FLASHINFER_MOE_FP4=0
  # VLLM_FP8_MOE_BACKEND=flashinfer_cutlass
  # FLASHINFER_DISABLE_VERSION_CHECK=1
  # CUTE_DSL_ARCH=sm_121a

# ── vLLM arguments ──────────────────────────────────────────────────────────
# All --flags go here, one per line.
# Only --model is required; the rest are optional defaults.
args:
  --model deepreinforce-ai/Ornith-1.0-35B                        # required: model repo id
  --port 8000                                    # vLLM server port (container side)
  --tensor-parallel-size 1                       # # of GPUs (1 = single GPU)

  # ── Model variant / revision ─────────────────────────────────────────────
  # --model-impl auto                            # auto | terratorch | transformers | vllm
  # --revision 1.0.0                             # branch name / tag / commit
  # --tokenizer tokenizer_name                   # override tokenizer
  # --tokenizer-mode auto                        # auto | hf | slow | mistral | deepseek_v32 | deepseek_v4
  # --hf-config-path PATH                        # custom config path
  # --hf-overrides {"key":"val"}                 # HF config overrides (JSON)
  # --config-format auto                         # auto | hf | mistral

  # ── Data type ──────────────────────────────────────────────────────────────
  --dtype bfloat16                                   # auto | half | float16 | bfloat16 | float | float32
  # --override-attention-dtype bfloat16         # override attention dtype
  # --convert auto                              # auto | classify | embed | none (model adapter conversion)

  # ── Quantization ──────────────────────────────────────────────────────────
  # --quantization modelopt                      # none | modelopt | awq | gptq | tensorrtllm | marlin | fp8 | etc.
  # --quantization-config {"per_layer":true,...} # per-layer specs (JSON)
  # --allow-deprecated-quantization              # allow old quant methods

  # ── KV cache ──────────────────────────────────────────────────────────────
  # --kv-cache-dtype fp8                         # fp8 | fp16 | auto
  # --rope-scaling {"type":"linear","factor":2} # rope config (JSON)
  # --pooler-config {"type":"pooling"}          # pooling config (JSON)

  # ── Context length & throughput ───────────────────────────────────────────
  --max-model-len 262144                         # 1k, 1K, 25.6k, -1, auto also work
  --max-num-seqs 4                              # max concurrent sequences
  --max-num-batched-tokens 8192                  # max tokens per batch
  # --max-logprobs 20                            # max logprobs to return (-1 = unlimited)
  # --disable-cascade-attn                      # disable cascade attention
  --enable-chunked-prefill                       # better throughput for long prompts
  --async-scheduling                             # async engine execution
  --enable-prefix-caching                        # cache KV for repeated prefixes

  # ── Memory ────────────────────────────────────────────────────────────────
  --gpu-memory-utilization 0.85                  # fraction of VRAM for model
  # --enable-cumem-allocator                     # custom cumem allocator (multi-NVLink)
  # --enable-sleep-mode                          # sleep mode for GPU memory

  # ── Inference behavior ────────────────────────────────────────────────────
  --trust-remote-code                            # required for some models
  # --enforce-eager                              # always use eager mode (no CUDA graphs)
  # --enable-return-routed-experts               # return MoE expert routing
  # --seed 0                                     # random seed
  # --skip-tokenizer-init                        # skip tokenizer (token_ids input)

  # ── Generation ────────────────────────────────────────────────────────────
  # --generation-config auto                     # auto | vllm | /path/to/config
  # --override-generation-config {"temperature":0.5} # generation overrides (JSON)
  # --logits-processors module:Class             # custom logits processors
  # --logprobs-mode raw_logprobs                 # raw_logprobs | processed_logprobs | raw_logits | processed_logits
  # --max-logprobs 20                            # max logprobs per token

  # ── Serving ───────────────────────────────────────────────────────────────
  # --served-model-name my-model                 # API model name(s)
  # --allowed-local-media-path /images           # local media dirs
  # --allowed-media-domains example.com          # allowed media domains
  # --renderer-num-workers 1                     # renderer threads

  # ── Speculative decoding ──────────────────────────────────────────────────
  # --speculative-config '{"method":"mtp","num_speculative_tokens":3,"moe_backend":"triton"}'

  # ── Tool calling ──────────────────────────────────────────────────────────
  # --enable-auto-tool-choice
  # --tool-call-parser hf_auto                   # hf_auto | qwen3_xml | zephyr_chat | etc.
  # --reasoning-parser qwen3                     # qwen3, deepthink, etc.
  --disable-access-log-for-endpoints /health,/metrics,/ping  # silence health/metrics/ping/chat noise

  # ── JSON args (alternative syntax) ────────────────────────────────────────
  # --json-arg '{"key1":"val1","key2":{"key3":"val2"}}'
  # --json-arg.key1 val1 --json-arg.key2.key3 val2
  # --json-arg.key4+ val1 --json-arg.key4+='val2,val3'  # list elements
