# ── Ornith-1.0-35B-NVFP4 (MoE Self-Scaffolding Coder) ──────────────────────
# qwen3_5_moe MoE architecture with Qwen3-VL vision tower
# NVFP4 W4A4 quantized via compressed-tensors (auto-detected, no quantization flag)
# 35B total / ~8.6B active, 256 experts x 40 layers, 262k context, MIT license
# 21.9 GB bf16→NVFP4 (from 70.3 GB), runs on single 16GB GPU
#
# Recommended for: agentic coding, self-scaffolding, code generation with vision
#
# Container: vllm-ornith-1.0-35b
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/sakamakismile/Ornith-1.0-35B-NVFP4
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.23.0
port: 8000

env:
  FLASHINFER_DISABLE_VERSION_CHECK=1

args:
  --model sakamakismile/Ornith-1.0-35B-NVFP4
  --served-model-name ornith-1.0-35b
  --port 8000
  --tensor-parallel-size 1
  --trust-remote-code
  --disable-custom-all-reduce
  --kv-cache-dtype fp8
  --attention-backend flashinfer
  --moe-backend marlin
  --gpu-memory-utilization 0.9
  --max-model-len 262144
  --max-num-seqs 16
  --max-num-batched-tokens 8192
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --trust-remote-code
  --disable-access-log-for-endpoints /health,/metrics,/ping
