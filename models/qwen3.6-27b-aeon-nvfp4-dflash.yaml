image: ghcr.io/aeon-7/vllm-aeon-ultimate-dflash:qwen36-v4
port: 8001

env:
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: "1"
  TORCH_CUDA_ARCH_LIST: "12.1a"
  PYTORCH_CUDA_ALLOC_CONF: "expandable_segments:True"
  TORCH_MATMUL_PRECISION: "high"
  NVIDIA_FORWARD_COMPAT: "1"
  NVIDIA_DISABLE_REQUIRE: "1"
  ENABLE_NVFP4_SM100: "0"
  VLLM_USE_FLASHINFER_MOE_FP4: "0"
  VLLM_TEST_FORCE_FP8_MARLIN: "0"
  VLLM_USE_FLASHINFER_SAMPLER: "1"
  VLLM_NVFP4_GEMM_BACKEND: "flashinfer-cutlass"

args:
  --model AEON-7/Qwen3.6-27B-AEON-Ultimate-Uncensored-Multimodal-NVFP4-MTP-XS
  --served-model-name qwen36-27b-aeon
  --port 8000
  --tensor-parallel-size 1
  --quantization modelopt
  --dtype auto
  --kv-cache-dtype fp8
  --load-format fastsafetensors
  --attention-backend flashinfer
  --gpu-memory-utilization 0.75
  --max-model-len 256000
  --max-num-batched-tokens 32768
  --max-num-seqs 64
  --enable-chunked-prefill
  --enable-prefix-caching
  --async-scheduling
  --speculative-config '{"method":"dflash","path":"/root/.cache/huggingface/hub/models--z-lab--Qwen3.6-27B-DFlash","k":15}'
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --disable-access-log-for-endpoints /health,/metrics,/ping
  --reasoning-parser qwen3
  --limit-mm-per-prompt '{"image":4,"video":2}'
  --mm-encoder-tp-mode data
  --mm-processor-cache-type shm
  --trust-remote-code
