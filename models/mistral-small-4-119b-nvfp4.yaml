# ── Mistral Small 4 119B NVFP4 ───────────────────────────────────────────────
# Multimodal MoE (MLA architecture) — 119B total, 6.5B active params
# 128 experts, 4 active per token, NVFP4 quantized
# 256k context, vision + text, multilingual (24+ languages)
#
# Recommended for: general chat, coding, agentic tasks, reasoning, document
# vision understanding
# Stable image: vllm/vllm-openai:v0.23.0.
# ⚠️ HF recommends TP=2 for 256k; single GPU may be tight at 119B
# Uses Mistral-specific parsers (reasoning + tool calls)
#
# Container: vllm-mistral-small-4
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/mistralai/Mistral-Small-4-119B-2603-NVFP4
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.23.0
port: 8000

args: 
  --model mistralai/Mistral-Small-4-119B-2603-NVFP4
  --served-model-name mistral-small-4
  --port 8000
  --tensor-parallel-size 1
  --dtype auto
  --attention-backend TRITON_MLA
  --reasoning-parser mistral
  --tool-call-parser mistral
  --enable-auto-tool-choice
  --gpu-memory-utilization 0.85
  --max-model-len 262144
  --max-num-batched-tokens 8192
  --max-num-seqs 2
  --enable-prefix-caching
  --enable-chunked-prefill
  --disable-access-log-for-endpoints /health,/metrics,/ping
