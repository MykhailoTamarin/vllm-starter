# ── Qwen3.6-27B PrismaSCOUT NVFP4-MTP (speculative decoding) ─────────────────
# rdtand/Qwen3.6-27B-PrismaSCOUT-Blackwell-NVFP4-BF16-vllm
# 5.31 bpp mixed NVFP4+BF16 quantization via PrismaSCOUT allocation
# 27B params dense, 20.17 GB, MTP heads with 3 speculative tokens
# 262K context, Apache 2.0
#
# Sampling parameters for Qwen-style generation:
# - Thinking general: temperature=1.0, top_p=0.95, top_k=20, min_p=0.0, presence_penalty=0.0, repetition_penalty=1.0
# - Thinking coding: temperature=0.6, top_p=0.95, top_k=20, min_p=0.0, presence_penalty=0.0, repetition_penalty=1.0
# - Instruct/non-thinking: temperature=0.7, top_p=0.80, top_k=20, min_p=0.0, presence_penalty=1.5, repetition_penalty=1.0
#
# Recommended for: agentic coding, fast inference, low-latency text generation
# Stable image: vllm/vllm-openai:v0.22.1-aarch64-ubuntu2404.
# Container: vllm-qwen3.6-27b-mtp
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/rdtand/Qwen3.6-27B-PrismaSCOUT-Blackwell-NVFP4-BF16-vllm
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.22.1-aarch64-ubuntu2404
port: 8000

env:
  FLASHINFER_DISABLE_VERSION_CHECK=1
  VLLM_MARLIN_USE_ATOMIC_ADD=1
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS=0

args:
  --model sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
  --served-model-name qwen3.6-27b
  --port 8000
  --tensor-parallel-size 1
  --language-model-only
  --max-model-len 262144
  --max-num-batched-tokens 8192
  --max-num-seqs 4
  --gpu-memory-utilization 0.8
  --dtype auto
  --kv-cache-dtype fp8
  --enable-prefix-caching
  --enable-chunked-prefill
  --trust-remote-code
  --quantization modelopt
  --reasoning-parser qwen3
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --default-chat-template-kwargs '{"preserve_thinking":true}'
  --speculative-config '{"method":"qwen3_5_mtp","num_speculative_tokens":3}'
  --disable-access-log-for-endpoints /health,/metrics,/ping
