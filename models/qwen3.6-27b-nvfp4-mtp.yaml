# ── Qwen3.6-27B-Text-NVFP4-MTP (speculative decoding) ──────────────────────
# Text-only NVFP4 quantized variant of Qwen3.6-27B, 27B params dense
# MTP (Multi-Token Prediction) heads with 3 speculative tokens per step
# 262K context, Apache 2.0
#
# Recommended for: agentic coding, fast inference, low-latency text generation
# ⚠️ Requires nightly: NVFP4 quantization not yet available in stable releases
#
# Container: vllm-qwen3.6-27b-mtp
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:nightly
port: 8000

args:
  --model sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
  --served-model-name qwen3.6-27b
  --port 8000
  --tensor-parallel-size 1
  --trust-remote-code
  --dtype auto
  --quantization modelopt
  --language-model-only
  --kv-cache-dtype fp8
  --gpu-memory-utilization 0.85
  --max-model-len 262144
  --max-num-batched-tokens 32768
  --max-num-seqs 4
  --enable-chunked-prefill
  --enable-prefix-caching
  --async-scheduling
  --speculative-config '{"method":"qwen3_5_mtp","num_speculative_tokens":3}'
  --kernel-config '{"enable_flashinfer_autotune":false}'
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --disable-access-log-for-endpoints /health,/metrics,/ping
  --reasoning-parser qwen3
  --chat-template-file /app/chat_template.jinja"

volumes:
 - ${PROJECT_DIR}/models/files/chat_template.jinja:/app/chat_template.jinja
 