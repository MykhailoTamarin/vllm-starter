# ── Qwen3.6 27B FP8 (dense language model) ──
# Qwen3.6-27B-Text-NVFP4-MTP by sakamakismile
# Uses built-in MTP heads for speculative decoding
# ⚠️ Requires nightly: NVFP4 quantization not yet available in stable releases
# Check https://github.com/vllm-project/vllm/releases to downgrade when stable supports it

image: vllm/vllm-openai:nightly
port: 8000

args:
  --model sakamakismile/Qwen3.6-27B-Text-NVFP4-MTP
  --served-model-name qwen3.6-27b
  --port 8000
  --tensor-parallel-size 1
  --dtype auto
  --kv-cache-dtype fp8
  --load-format fastsafetensors
  --attention-backend flashinfer
  --gpu-memory-utilization 0.85
  --max-model-len 262144
  --max-num-batched-tokens 32768
  --max-num-seqs 4
  --enable-chunked-prefill
  --enable-prefix-caching
  --async-scheduling
  --speculative-config '{"method":"qwen3_5_mtp","num_speculative_tokens":3}'
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --disable-access-log-for-endpoints /health,/metrics,/ping
  --reasoning-parser qwen3
  --trust-remote-code
