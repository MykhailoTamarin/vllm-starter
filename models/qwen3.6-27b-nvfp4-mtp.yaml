# ── Qwen3.6-27B PrismaSCOUT NVFP4-MTP (speculative decoding) ─────────────────
# rdtand/Qwen3.6-27B-PrismaSCOUT-Blackwell-NVFP4-BF16-vllm
# 5.31 bpp mixed NVFP4+BF16 quantization via PrismaSCOUT allocation
# 27B params dense, 20.17 GB, MTP heads with 3 speculative tokens
# 262K context, Apache 2.0
#
# Recommended for: agentic coding, fast inference, low-latency text generation
# ⚠️ Requires nightly: NVFP4-native Blackwell quantization needs vllm:nightly
#
# Container: vllm-qwen3.6-27b-mtp
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/rdtand/Qwen3.6-27B-PrismaSCOUT-Blackwell-NVFP4-BF16-vllm
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:nightly
port: 8000

env:
  NVIDIA_FORWARD_COMPAT: '1'
  VLLM_MARLIN_USE_ATOMIC_ADD: '1'
  FLASHINFER_DISABLE_VERSION_CHECK: '1'
  TORCH_MATMUL_PRECISION: high
  VLLM_TEST_FORCE_FP8_MARLIN: '1'
  TRANSFORMERS_OFFLINE: '1'
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE: '600'
  HF_HUB_OFFLINE: '1'

args:
  --model rdtand/Qwen3.6-27B-PrismaSCOUT-Blackwell-NVFP4-BF16-vllm
  --served-model-name qwen3.6
  --port 8000
  --tensor-parallel-size 1
  --language-model-only
  --max-model-len 262144
  --max-num-batched-tokens 32768
  --max-num-seqs 8
  --gpu-memory-utilization 0.8
  --dtype auto
  --kv-cache-dtype auto
  --load-format fastsafetensors
  --enable-prefix-caching
  --enable-chunked-prefill
  --trust-remote-code
  --quantization compressed-tensors
  --reasoning-parser qwen3
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --optimization-level 3
  --performance-mode throughput
  --default-chat-template-kwargs '{"preserve_thinking":true}'
  --speculative-config '{"method":"mtp","num_speculative_tokens":3}'
  --disable-access-log-for-endpoints /health,/metrics,/ping
