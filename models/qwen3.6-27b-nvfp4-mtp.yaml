# ── Qwen3.6-27B NVFP4 (official NVIDIA quantization) ────────────────────────
# nvidia/Qwen3.6-27B-NVFP4
# NVFP4 quantization via NVIDIA Model Optimizer v0.45.0
# 27B params dense, Hybrid Attention (Gated DeltaNet + Gated Attention)
# 262K context, Apache 2.0, supports text/image/video input
#
# Sampling parameters for Qwen-style generation:
# - Thinking general: temperature=1.0, top_p=0.95, top_k=20, min_p=0.0, presence_penalty=0.0, repetition_penalty=1.0
# - Thinking coding: temperature=0.6, top_p=0.95, top_k=20, min_p=0.0, presence_penalty=0.0, repetition_penalty=1.0
# - Instruct/non-thinking: temperature=0.7, top_p=0.80, top_k=20, min_p=0.0, presence_penalty=1.5, repetition_penalty=1.0
#
# Recommended for: agentic coding, fast inference, multimodal (text/image/video)
# Stable image: vllm/vllm-openai:nightly.
# Container: vllm-qwen3.6-27b-nvfp4
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/nvidia/Qwen3.6-27B-NVFP4
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.25.1

env: 
  CUTE_DSL_ARCH=sm_121a
  FLASHINFER_DISABLE_VERSION_CHECK=1
  VLLM_MARLIN_USE_ATOMIC_ADD=1
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600
  VLLM_TARGET_DEVICE=cuda

args: 
  --model nvidia/Qwen3.6-27B-NVFP4
  --served-model-name qwen3.6-27b
  --port 8000
  --tensor-parallel-size 1
  --max-model-len 262144
  --max-num-batched-tokens 8192
  --max-num-seqs 4
  --gpu-memory-utilization 0.75
  --dtype auto
  --kv-cache-dtype fp8
  --attention-backend flashinfer
  --enable-prefix-caching
  --enable-chunked-prefill
  --trust-remote-code
  --quantization modelopt
  --reasoning-parser qwen3
  --enable-auto-tool-choice
  --async-scheduling
  --tool-call-parser qwen3_coder
  --default-chat-template-kwargs '{"preserve_thinking":true}'
  --speculative-config '{"method":"mtp","num_speculative_tokens":3}'
  --disable-access-log-for-endpoints /health,/metrics,/ping
