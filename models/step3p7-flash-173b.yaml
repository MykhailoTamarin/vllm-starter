# ── Step-3.7-Flash-173B REAP NVFP4 (conservative pruning) ──
# REAP-pruned: 250/288 experts kept, 25.10B params removed
# 173B effective params, ~11B active/token
# 108 GB on disk — fits in a single 128 GB DGX Spark
# Vision-language MoE, agentic workflows, tool-use, reasoning
#
# Container: vllm-step3p7-flash-173b
# API: http://localhost:8001/v1/chat/completions
# Model name in API: step3p7-flash-173b
#
# ⚠️ Requires stepfun37: NVFP4 quantization not yet available in stable releases

image: vllm/vllm-openai:stepfun37
port: 8001

env:
  VLLM_NVFP4_GEMM_BACKEND=flashinfer-cutlass
  VLLM_USE_FLASHINFER_MOE_FP4=0
  FLASHINFER_DISABLE_VERSION_CHECK=1
  VLLM_ATTENTION_BACKEND=FLASHINFER
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600
  SAFETENSORS_FAST_GPU=1
  OMP_NUM_THREADS=8
  TORCHINDUCTOR_MAX_AUTOTUNE=0

args: --model 0xSero/Step-3.7-Flash-173B
  --host 0.0.0.0
  --served-model-name step3p7-flash-173b
  --port 8001
  --tensor-parallel-size 1
  --enable-expert-parallel
  --trust-remote-code
  --dtype auto
  --quantization modelopt
  --kv-cache-dtype fp8
  --attention-backend flashinfer
  --gpu-memory-utilization 0.9
  --max-model-len 32768
  --max-num-seqs 1
  --max-num-batched-tokens 8192
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --enable-auto-tool-choice
  --tool-call-parser step3p5
  --reasoning-parser step3p5
  --disable-access-log-for-endpoints /health,/metrics,/ping
