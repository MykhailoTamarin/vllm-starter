# ── poolside/Laguna-S-2.1-NVFP4 ────────────────────────────────────────
# MoE for agentic coding — 117.6B total, 8.5B active params
# 256 experts + 1 shared, 48 layers (12 global / 36 SWA), 262k context
# NVFP4 quantization (auto-detected), ~71 GB on disk
# DFlash speculative decoding with poolside/Laguna-S-2.1-DFlash-NVFP4
#
# ⚠️ - max-num-seqs 32 required (DFlash crashes at default 256)
# ⚠️ - CUTE_DSL_ARCH=sm_121a env for FP4 kernel JIT on DGX Spark
# ⚠️ - MAX_JOBS=4 env required to prevent OOM during nvcc JIT fan-out
# ⚠️ - Do NOT set --linear-backend flashinfer_b12x on v0.25.1
# ⚠️ - override-generation-config recommended (raw defaults degrade NVFP4)
#
# Recommended for: agentic coding, long-horizon tasks, SWE benchmarks
# OpenMDW-1.1 license
#
# Container: vllm-laguna-s-2.1-nvfp4
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/poolside/Laguna-S-2.1-NVFP4
#
# ──────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.25.1

env:
  CUTE_DSL_ARCH=sm_121a
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600

args:
  --model poolside/Laguna-S-2.1-NVFP4
  --served-model-name laguna-s-2.1
  --port 8000
  --trust-remote-code
  --tensor-parallel-size 1
  --pipeline-parallel-size 1
  --max-model-len 262144
  --max-num-seqs 4
  --max-num-batched-tokens 8192
  --gpu-memory-utilization 0.9
  --kv-cache-dtype fp8
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --enable-auto-tool-choice
  --tool-call-parser poolside_v1
  --reasoning-parser poolside_v1
  --override-generation-config '{"temperature":0.7,"top_p":0.95}'
  --speculative-config '{"model":"poolside/Laguna-S-2.1-DFlash-NVFP4","num_speculative_tokens":15,"method":"dflash"}'
  --disable-access-log-for-endpoints /health,/metrics,/ping
