# ── Qwen3.6-27B NVFP4 (unsloth official, MTP) ────────────────────────────────
# unsloth/Qwen3.6-27B-NVFP4
# 27B dense (Gated DeltaNet + Gated Attention), NVFP4 quantized
# 262K context (native), extensible to 1M with YaRN
# Apache 2.0
#
# Recommended for: agentic coding, fast inference, low-latency text generation
# Stable image: vllm/vllm-openai:v0.22.1-aarch64-ubuntu2404.
#
# Container: vllm-qwen3.6-27b-unsloth
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/unsloth/Qwen3.6-27B-NVFP4
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.22.1-aarch64-ubuntu2404
port: 8000

env:
  FLASHINFER_DISABLE_VERSION_CHECK=1
  VLLM_MARLIN_USE_ATOMIC_ADD=1
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600

args:
  --model unsloth/Qwen3.6-27B-NVFP4
  --served-model-name qwen3.6-27b
  --port 8000
  --tensor-parallel-size 1
  --trust-remote-code
  --dtype auto
  --max-model-len 262144
  --max-num-batched-tokens 16384
  --max-num-seqs 4
  --gpu-memory-utilization 0.85
  --kv-cache-dtype fp8
  --enable-prefix-caching
  --enable-chunked-prefill
  --speculative-config '{"method":"mtp","num_speculative_tokens":3}'
  --reasoning-parser qwen3
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --default-chat-template-kwargs '{"preserve_thinking":true}'
  --disable-access-log-for-endpoints /health,/metrics,/ping
