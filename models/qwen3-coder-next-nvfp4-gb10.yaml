# ── Qwen3-Coder-Next NVFP4 GB10 (MoE, coding, compressed-tensors) ─────────────────────
# saricles/Qwen3-Coder-Next-NVFP4-GB10
# NVFP4 quantization of Qwen3-Coder-Next MoE for DGX Spark GB10
# 79.7B params, 3B active (512 experts, 10 active) · compressed-tensors format
# DeltaNet+attention hybrid architecture · ~62 tok/s decode constant across context
# 262K context, Apache 2.0, ~46 GB disk
#
# Recommended for: coding, agentic tool calling, long context generation
# ⚠️ Single GPU model (128 GB GB10 required); compressed-tensors format not modelopt
# Container: vllm-qwen3-coder-next-nvfp4-gb10
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/saricles/Qwen3-Coder-Next-NVFP4-GB10
#
# ─────────────────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.22.1-aarch64-ubuntu2404
port: 8000

env:
  VLLM_NVFP4_GEMM_BACKEND=marlin
  VLLM_TEST_FORCE_FP8_MARLIN=1
  VLLM_USE_FLASHINFER_MOE_FP4=0
  VLLM_MARLIN_USE_ATOMIC_ADD=1
  FLASHINFER_DISABLE_VERSION_CHECK=1

args:
  --model saricles/Qwen3-Coder-Next-NVFP4-GB10
  --port 8000
  --tensor-parallel-size 1
  --quantization compressed-tensors
  --max-model-len 262144
  --max-num-seqs 8
  --max-num-batched-tokens 32768
  --gpu-memory-utilization 0.90
  --dtype auto
  --kv-cache-dtype fp8
  --attention-backend flashinfer
  --enable-prefix-caching
  --enable-chunked-prefill
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --disable-access-log-for-endpoints /health,/metrics,/ping
