# ── OpenYourMind Qwopus3.5-122B-A10B-Kimi-K2.6 NVFP4 ─────────────────────────
# 4-bit NVFP4 MoE — ~122B total / ~10B active params (Qwen3.5 architecture)
# Kimi-K2.6 distilled + reasoning-DPO healed + abliterated (uncensored)
# Vision tower (BF16) + MTP head (BF16, untrained, shipped for forward-compat)
# 256K context, MIT license
#
# Recommended for: agentic coding, long-context reasoning, uncensored tasks
# Stable image: v0.23.0 (auto-detects compressed-tensors NVFP4)
# ⚠️ Requires Blackwell GPU ≥96 GB for native FP4 math (sm_121a)
# ⚠️ If torch.compile errors in GDN path, add --compilation-config
#     '{"use_inductor_graph_partition":true}'
#
# Container: vllm-qwopus3.5-122b
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/OpenYourMind/Qwopus3.5-122B-A10B-Kimi-K2.6-destilled-abliterated-NVFP4
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.23.0-aarch64-ubuntu2404
port: 8000

env:
  FLASHINFER_DISABLE_VERSION_CHECK=1
  CUTE_DSL_ARCH=sm_121a
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600
  VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
  VLLM_USE_FLASHINFER_MOE_FP4=0

args:
  --model OpenYourMind/Qwopus3.5-122B-A10B-Kimi-K2.6-destilled-abliterated-NVFP4
  --served-model-name qwopus3.5-122b
  --port 8000
  --tensor-parallel-size 1
  --trust-remote-code
  --dtype auto
  --kv-cache-dtype fp8
  --attention-backend flashinfer
  --gpu-memory-utilization 0.85
  --max-model-len 262144
  --max-num-seqs 4
  --max-num-batched-tokens 32768
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --enable-auto-tool-choice
  --tool-call-parser qwen3_coder
  --reasoning-parser qwen3
  --speculative-config '{"method":"mtp","num_speculative_tokens":1}'
  --disable-access-log-for-endpoints /health,/metrics,/ping
