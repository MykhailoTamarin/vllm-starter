# ── DeepSeek V4 Flash Spark (REAP 180B, NVFP4) ──────────────────────────────────
# REAP K160-pruned MoE (180B total) of deepseek-ai/DeepSeek-V4-Flash (284B total, 13B active)
# 43 layers, 160 experts/layer, hidden 4096, on-disk 96 GiB (NVFP4/MXFP4 + FP8 KV cache)
# 2-token MTP speculative decoding, 200K served context, Triton MLA, GB10/SM121 optimized
#
# Recommended for: single DGX Spark inference with speculative decoding
#
# Requires ghcr.io/0xsero/deepseek-v4-flash-spark-vllm:cutlass451-g27 (custom ARM64 vLLM).
# Uses patches for nonstandard REAP expert counts (K160), MXFP4 memory hygiene, and FlashInfer CUDA IPC.
#
# ── Key compat notes ────────────────────────────────────────────────────────
# env: VLLM_TRITON_MLA_SPARSE_ALLOW_CUDAGRAPH -> must be 1
# env: VLLM_ENABLE_DEEPSEEK_V4_SPARSE_MLA_WARMUP -> 0 (disabled; image patches handle it)
# env: VLLM_ENABLE_DEEPSEEK_V4_MHC_WARMUP -> must be 1
# args: --reasoning-config '{"reasoning_parser":"deepseek_v4",...}'
# args: --default-chat-template-kwargs '{"thinking":true}'
#
# Container: vllm-deepseek-v4-flash-spark
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/0xSero/DeepSeek-V4-Flash-180B
# Base:      https://huggingface.co/deepseek-ai/DeepSeek-V4-Flash
# GHCR:      ghcr.io/0xsero/deepseek-v4-flash-spark-vllm:cutlass451-g27
# REAP:      https://arxiv.org/abs/2510.13999
#
# ─────────────────────────────────────────────────────────────────────────────────

image: ghcr.io/0xsero/deepseek-v4-flash-spark-vllm:cutlass451-g27
port: 8000

# ── Pre-launch command ───────────────────────────────────────────────────
# The DeepSeek Spark image ships with vLLM installed but the REAP/MBXP
# patches need to be applied at runtime before vllm serve starts.
# This command runs the patch script then exec's vllm serve with all
# the args from --args: below. The patch file is mounted from
# $PROJECT_DIR/models/files/ (see volumes:).
command: 'python3 /patch/patch_vllm_reap_gb10.py && exec vllm serve'

volumes:
  - $PROJECT_DIR/models/files:/patch:ro

env:
  VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
  VLLM_TRITON_MLA_SPARSE=1
  VLLM_TRITON_MLA_SPARSE_ALLOW_CUDAGRAPH=1
  VLLM_ENABLE_DEEPSEEK_V4_MHC_WARMUP=1
  VLLM_ENABLE_DEEPSEEK_V4_SPARSE_MLA_WARMUP=0
  VLLM_DEEPSEEK_V4_MHC_WARMUP_TOKEN_SIZES=
  VLLM_TRITON_MLA_WARMUP_TOKEN_SIZES=
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600
  FLASHINFER_DISABLE_VERSION_CHECK=1
  TILELANG_CLEANUP_TEMP_FILES=1
  DG_JIT_USE_NVRTC=0
  DG_JIT_NVCC_COMPILER=/usr/local/cuda/bin/nvcc
  NCCL_IB_DISABLE=1
  NCCL_DEBUG=WARN
  K160_DISABLE_CUTEDSL=0
  CUTEDSL_VERSION=
  VLLM_MXFP4_MARLIN_DEEPGEMM_LAYERS=
  PYTORCH_CUDA_ALLOC_CONF=expandable_segments:True

args:
  --model 0xSero/DeepSeek-V4-Flash-180B
  --served-model-name deepseek-v4-flash
  --trust-remote-code
  --tensor-parallel-size 1
  --pipeline-parallel-size 1
  --kv-cache-dtype fp8
  --block-size 256
  --max-model-len 262144
  --max-num-seqs 1
  --max-num-batched-tokens 4096
  --gpu-memory-utilization 0.88
  --distributed-executor-backend mp
  --tokenizer-mode deepseek_v4
  --load-format safetensors
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --tool-call-parser deepseek_v4
  --enable-auto-tool-choice
  --reasoning-parser deepseek_v4
  --reasoning-config '{"reasoning_parser":"deepseek_v4","reasoning_start_str":"<think>","reasoning_end_str":"</think>"}'
  --default-chat-template-kwargs '{"thinking":true}'
  --compilation-config '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}'
  --speculative-config '{"method":"deepseek_mtp","num_speculative_tokens":2}'
  --disable-access-log-for-endpoints /health,/metrics,/ping
