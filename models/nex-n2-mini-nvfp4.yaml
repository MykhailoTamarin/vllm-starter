# ── Nex-N2-mini NVFP4 (Qwen3.5-MoE-35B fine-tune) ────────────────────────────
# NVFP4-quantized Nex-N2-mini — Qwen3.5-MoE-35B fine-tune via ModelOpt 0.44.0
# Mixture of 10,240 experts (256/layer × 40 layers), 22.1 GiB on disk
#
# Recommended sampling parameters for Nex-N2-mini:
# - temperature: 0.7
# - top_p: 0.95
# - top_k: 40
#
# Recommended for: agentic coding, general-purpose text inference on single GPU
# Stable image: vllm/vllm-openai:v0.22.1-aarch64-ubuntu2404.
# ⚠️ Blackwell (SM 12.1) hardware recommended
#
# Container: vllm-nex-n2-mini-nvfp4
# API:       http://localhost:8000/v1/chat/completions
# HF (NVFP4):        https://huggingface.co/r0b0tlab/nex-n2-mini-nvfp4
# HF (Original):     https://huggingface.co/nex-agi/Nex-N2-mini
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.22.1-aarch64-ubuntu2404
port: 8000

env:
  FLASHINFER_DISABLE_VERSION_CHECK=1
  CUTE_DSL_ARCH=sm_121a
  VLLM_ATTENTION_BACKEND=FLASHINFER
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600

args:
  --model r0b0tlab/nex-n2-mini-nvfp4
  --served-model-name nex-n2-mini-nvfp4
  --port 8000
  --tensor-parallel-size 1
  --trust-remote-code
  --dtype auto
  --quantization modelopt_fp4
  --kv-cache-dtype fp8
  --attention-backend flashinfer
  --moe-backend flashinfer_cutlass
  --gpu-memory-utilization 0.5
  --max-model-len 262144
  --max-num-seqs 4
  --max-num-batched-tokens 8192
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --reasoning-parser qwen3
  --tool-call-parser qwen3_coder
  --enable-auto-tool-choice
  --disable-access-log-for-endpoints /health,/metrics,/ping
