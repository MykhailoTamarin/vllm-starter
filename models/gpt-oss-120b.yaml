# ── OpenAI GPT-OSS 120B MXFP4 ───────────────────────────────────────────────
# GPT-OSS family — Mamba-based MoE (SSM + attention hybrid)
# 117B total params, 5.1B active params, MXFP4 quantized (MoE weights)
# Fits on single 80GB GPU (H100 / MI300X)
#
# Recommended for: reasoning, agentic tasks, function calling, code generation
# ⚠️ Requires nightly vLLM with gpt-oss support (0.10.1+gptoss or nightly)
# Uses harmony response format — not compatible with standard chat templates
#
# Container: vllm-gpt-oss-120b
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/openai/gpt-oss-120b
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:nightly
port: 8000

env:
  VLLM_USE_FLASHINFER_MOE_MXFP4_MXFP8: "1"

args:
  --model openai/gpt-oss-120b
  --port 8000
  --tensor-parallel-size 1
  --tool-call-parser openai
  --reasoning-parser openai_gptoss
  --enable-auto-tool-choice
  --distributed-executor-backend ray
  --gpu-memory-utilization 0.85
  --enable-prefix-caching
  --load-format fastsafetensors
  --quantization mxfp4
  --max-num-seqs 4
  --mxfp4-backend CUTLASS
  --mxfp4-layers moe,qkv,o,lm_head
  --attention-backend FLASHINFER
  --kv-cache-dtype fp8
  --max-num-batched-tokens 8192
  --max-model-len 262144
  --disable-access-log-for-endpoints /health,/metrics,/ping
