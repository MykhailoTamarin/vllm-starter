# ── DeepSeek V4 Flash 180B (K160 REAP-pruned) ──
# REAP-pruned DeepSeek V4 Flash — 180B active params, 160 experts/layer
# Requires custom Docker image: ghcr.io/0xsero/deepseek-v4-flash-spark-vllm:cutlass451-g27
# MTP2 speculative decoding, 200K context, single DGX Spark
#
# Container: vllm-deepseek-v4-flash-180b
# API: http://localhost:8000/v1/chat/completions
# Model name in API: DeepSeek-V4-Flash-Spark

image: ghcr.io/0xsero/deepseek-v4-flash-spark-vllm:cutlass451-g27
port: 8000

env:
  FLASHINFER_DISABLE_VERSION_CHECK=1
  CUTE_DSL_ARCH=sm_121a
  VLLM_ATTENTION_BACKEND=FLASHINFER
  VLLM_HTTP_TIMEOUT_KEEP_ALIVE=600
  THINKING=true
  VLLM_ENABLE_DEEPSEEK_V4_SPARSE_MLA_WARMUP=0
  VLLM_TRITON_MLA_SPARSE_ALLOW_CUDAGRAPH=1

args:
  --model 0xSero/DeepSeek-V4-Flash-180B
  --model-revision 7c360e1cd4a5168099dbc54d16d929bf6df04990
  --served-model-name DeepSeek-V4-Flash-Spark
  --port 8000
  --tensor-parallel-size 1
  --trust-remote-code
  --dtype auto
  --kv-cache-dtype fp8
  --gpu-memory-utilization 0.88
  --max-model-len 262144
  --max-num-seqs 1
  --max-num-batched-tokens 4096
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --speculative-config '{"method":"deepseek_mtp","num_speculative_tokens":2}'
  --disable-access-log-for-endpoints /health,/metrics,/ping
