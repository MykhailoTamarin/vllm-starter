# ── MiniMax M2.7 REAP 139B-A10B NVFP4 (GB10) ──────────────────────────────
# MoE (MiniMaxM2ForCausalLM, 154 experts pruned from 256, top-K=8) — REAP 40% + NVFP4 W4A4 quantized
# 139B total params, ~10B active/token, 62 layers, ~80 GB
#
# Recommended for: agentic workflows, tool-use, code generation, math, software
# engineering
# Stable image: vllm/vllm-openai:v0.23.0.
# ⚠️ Quantized for GB10 (DGX Spark / Blackwell). On Hopper (H100/H200) use
# FP8 variant instead. W4A4 is not supported on Hopper/Ampere.
#
# Container: vllm-minimax-m2.7-reap
# API:       http://localhost:8000/v1/chat/completions
# HF:        https://huggingface.co/dervig/m51Lab-MiniMax-M2.7-REAP-139B-A10B-NVFP4-GB10
#
# ──────────────────────────────────────────────────────────────────────────

image: vllm/vllm-openai:v0.23.0
port: 8000

env: 
  VLLM_NVFP4_GEMM_BACKEND=flashinfer-cutlass
  VLLM_USE_FLASHINFER_MOE_FP4=0
  SAFETENSORS_FAST_GPU=1
  OMP_NUM_THREADS=8
  TORCHINDUCTOR_MAX_AUTOTUNE=0

args: 
  --model dervig/m51Lab-MiniMax-M2.7-REAP-139B-A10B-NVFP4-GB10
  --served-model-name minimax-m2.7-reap
  --port 8000
  --tensor-parallel-size 1
  --trust-remote-code
  --dtype auto
  --kv-cache-dtype fp8_e4m3
  --attention-backend flashinfer
  --gpu-memory-utilization 0.85
  --max-model-len 262144
  --max-num-seqs 1
  --max-num-batched-tokens 4096
  --enable-chunked-prefill
  --async-scheduling
  --enable-prefix-caching
  --enable-auto-tool-choice
  --tool-call-parser minimax_m2
  --reasoning-parser minimax_m2_append_think
  --compilation-config '{"cudagraph_mode":"none","inductor_compile_config":{"combo_kernels":false,"benchmark_combo_kernel":false,"max_autotune":false,"max_autotune_gemm":false}}'
  --disable-access-log-for-endpoints /health,/metrics,/ping
